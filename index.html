<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Morning Routine</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <main class="container">
            <!-- everything except maybe footer -->

            <!--Heading - first section-->
            <header>
                <h1>Welcome to My Morning Routine</h1>

                <div style="display: flex; flex-direction: row; align-items: center; gap: 20px; justify-self: center;">
                    <h2 id="quote">Loading inspirational quote...</h2>
                    <button id="new-quote">New Quote</button>
                </div>

                <h1 id="greeting">Hello, Guest!</h1>
                <h1 id="live-clock">HH:MM:SS</h1>
            </header>

            <!--List - second section-->
            <section id = "task-section">
                <h2>Here, you can press the button below to add more tasks to your list!</h2>

                <div style="display: flex; flex-direction: row; align-items: center; gap: 50px;">
                    <p id="task-progress">0 / 0 tasks completed</p>
                    <div id="filter-buttons">
                        <button data-filter="All">All</button>
                        <button data-filter="Spiritual">🙏 Spiritual</button>
                        <button data-filter="Mind">🧠 Mind</button>
                        <button data-filter="Body">💪 Body</button>
                        <button data-filter="Other">📌 Other</button>
                        <button data-filter="Productivity">📌 Productivity</button>
                    </div>
                </div>

                <ol id="task-list">
                    <!--Tasks will be added here dynamically-->
                </ol>
            </section>

            <!--Form - third section-->
            <section id="task-options">
                <h2>Add a New Task</h2>
                <form>
                    <input type="text" placeholder="Enter a new task" />

                    <select id="task-label">
                        <option value="Spiritual">🙏 Spiritual</option>
                        <option value="Mind">🧠 Mind</option>
                        <option value="Body">💪 Body</option>
                        <option value="Other">📌 Other</option>
                        <option value="Productivity">📌 Productivity</option>
                    </select>

                    <input type="number" id="task-time" placeholder="Minutes" min="1" />

                    <button type="submit">Add Task</button>
                </form> <br />

                <div class = "buttons">
                    <button id="clear-tasks">Clear All Tasks</button>
                    <button id="reset-tasks">Reset Tasks</button>
                </div>

                <button id="update-name">Update name</button>

            </section>
        </main>

        <footer>
            <p>&copy; 2024 My Morning Routine</p>
            Inspirational quotes provided by <a href="https://zenquotes.io/" target="_blank">ZenQuotes API</a>
        </footer>

        <script type = "module" src="zen_quotes.js"></script>
        <script type = "module" src="quotes.js"></script>
        <script type = "module" src="clock.js"></script>
        <script type = "module" src="user.js"></script>
        <script type = "module" src="tasks.js"></script>
        <script type = "module" src="script.js"></script>
    </body>
</html>
